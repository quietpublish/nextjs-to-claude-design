name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - run: npm test
        # Chrome is installed so the headless `verify` tests run too (they
        # self-skip only when no Chrome is present).
        env:
          CHROME: ${{ steps.chrome.outputs.chrome-path }}
